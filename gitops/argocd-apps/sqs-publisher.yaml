apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sqs-publisher
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/AkshatDhiman07/kubernetes-incident-platform.git
    targetRevision: HEAD
    path: gitops/apps/sqs-publisher
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  revisionHistoryLimit: 5

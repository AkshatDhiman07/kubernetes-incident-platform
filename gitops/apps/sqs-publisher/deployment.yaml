apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqs-publisher
  namespace: default
  labels:
    app: sqs-publisher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sqs-publisher
  template:
    metadata:
      labels:
        app: sqs-publisher
    spec:
      serviceAccountName: sqs-publisher
      containers:
      - name: sqs-publisher
        image: 136492549275.dkr.ecr.us-east-1.amazonaws.com/sqs-publisher:v0.1.0
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: APP_VERSION
          value: "v0.1.0"
        - name: AWS_REGION
          value: "us-east-1"
        - name: SQS_QUEUE_URL
          value: "https://sqs.us-east-1.amazonaws.com/136492549275/incident-platform-alerts"
        resources:
          requests:
            memory: "96Mi"
            cpu: "50m"
          limits:
            memory: "192Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5

apiVersion: v1
kind: ServiceAccount
metadata:
  name: incident-service
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::136492549275:role/incident-platform-incident-service-irsa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: incident-service-reader
rules:
- apiGroups: [""]
  resources: ["events", "pods", "namespaces"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: incident-service-reader-binding
subjects:
- kind: ServiceAccount
  name: incident-service
  namespace: default
roleRef:
  kind: ClusterRole
  name: incident-service-reader
  apiGroup: rbac.authorization.k8s.io

apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-service
  namespace: default
  labels:
    app: incident-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident-service
  template:
    metadata:
      labels:
        app: incident-service
    spec:
      containers:
      - name: incident-service
        image: 136492549275.dkr.ecr.us-east-1.amazonaws.com/incident-service:v0.1.0
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: APP_VERSION
          value: "v0.1.0"
        resources:
          requests:
            memory: "96Mi"
            cpu: "50m"
          limits:
            memory: "192Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
